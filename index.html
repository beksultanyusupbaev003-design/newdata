<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>ZOLOTO_N1</title>
<script src="https://cdn.jsdelivr.net/npm/bwip-js@4.5.1/dist/bwip-js-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,sans-serif}

:root{
  --bg1:#0a0f1e;
  --bg2:#0d1428;
  --glass:rgba(255,255,255,0.07);
  --glass2:rgba(255,255,255,0.12);
  --glass-border:rgba(255,255,255,0.13);
  --text:#f0f4ff;
  --sub:rgba(180,195,230,0.7);
  --pri:#4f8ef7;
  --pri2:#6aa3ff;
  --acc:#a78bfa;
  --green:#34d399;
  --green2:#10b981;
  --ph:rgba(140,160,210,0.4);
  --r:20px;
  --shadow:0 8px 32px rgba(0,0,0,0.45);
  --glow:0 0 40px rgba(79,142,247,0.18);
}

body{
  background:var(--bg1);
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(79,142,247,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(167,139,250,0.14) 0%, transparent 55%);
  color:var(--text);
  min-height:100vh;
  padding:1rem;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.app{max-width:860px;width:100%}

/* CARD — glassmorphism */
.card{
  background:var(--glass);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-radius:var(--r);
  border:1px solid var(--glass-border);
  box-shadow:var(--shadow),var(--glow);
  padding:1.4rem 1.4rem 1.2rem;
  margin-bottom:1rem;
}

/* HEADER */
.head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:1.2rem}
h1{
  font-size:1.7rem;font-weight:800;letter-spacing:-.03em;
  display:flex;align-items:center;gap:10px;
}
.titleAnim{
  background:linear-gradient(90deg,#fff 0%,var(--pri2) 25%,var(--acc) 50%,var(--pri2) 75%,#fff 100%);
  background-size:300% auto;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:titleShine 4s linear infinite;
}
@keyframes titleShine{
  0%{background-position:0% 50%}
  100%{background-position:300% 50%}
}
h1 i{
  -webkit-text-fill-color:initial;
  color:var(--pri);
  filter:drop-shadow(0 0 8px rgba(79,142,247,0.6));
}
.badge{
  background:linear-gradient(135deg,var(--pri),var(--acc));
  color:#fff;font-size:.75rem;padding:.22rem .85rem;
  border-radius:30px;font-weight:700;
  box-shadow:0 2px 12px rgba(79,142,247,0.4);
  letter-spacing:.02em;
}

/* DARK TOGGLE BTN */
#darkBtn{
  background:var(--glass2);
  border:1px solid var(--glass-border);
  color:var(--text);
  padding:.48rem 1rem;border-radius:30px;
  font-size:.83rem;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;
  cursor:pointer;
  backdrop-filter:blur(12px);
  transition:all .18s;
}
#darkBtn:hover{background:rgba(255,255,255,0.17);border-color:rgba(255,255,255,0.25)}

/* BUTTONS */
.row{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:.9rem}
.btn{
  border:1px solid var(--glass-border);
  color:var(--text);
  padding:.52rem 1.1rem;
  border-radius:30px;
  font-size:.87rem;font-weight:600;
  display:inline-flex;align-items:center;gap:7px;
  cursor:pointer;
  background:var(--glass);
  backdrop-filter:blur(10px);
  transition:all .15s;
  white-space:nowrap;user-select:none;
}
.btn:hover{
  background:var(--glass2);
  border-color:rgba(255,255,255,0.25);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,0.3);
}
.btn.pri{
  background:linear-gradient(135deg,var(--pri),#3b75e8);
  border-color:transparent;
  color:#fff;
  box-shadow:0 4px 18px rgba(79,142,247,0.45);
}
.btn.pri:hover{
  background:linear-gradient(135deg,var(--pri2),var(--pri));
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(79,142,247,0.55);
}
.btn.grn{
  background:linear-gradient(135deg,var(--green),var(--green2));
  border-color:transparent;color:#fff;
  box-shadow:0 4px 18px rgba(52,211,153,0.35);
}
.btn.grn:hover{
  transform:translateY(-1px);
  box-shadow:0 6px 24px rgba(52,211,153,0.45);
}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important;box-shadow:none!important}

/* LABELS */
.lbl{
  font-size:.72rem;font-weight:700;color:var(--sub);
  text-transform:uppercase;letter-spacing:.08em;margin-bottom:.45rem;
}

/* SELECT */
.sel-wrap{position:relative;margin-bottom:.9rem}
.sel-wrap .ico{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--pri);font-size:.9rem;pointer-events:none}
.sel-wrap .arr{position:absolute;right:1rem;top:50%;transform:translateY(-50%);color:var(--sub);pointer-events:none;font-size:.8rem}
select{
  width:100%;
  padding:.78rem 2.4rem .78rem 2.6rem;
  border-radius:30px;
  border:1px solid var(--glass-border);
  background:rgba(15,22,45,0.7);
  color:var(--text);
  font-size:.93rem;font-weight:600;
  outline:none;appearance:none;cursor:pointer;
  backdrop-filter:blur(10px);
  transition:border-color .15s,box-shadow .15s;
}
select:focus{
  border-color:var(--pri);
  box-shadow:0 0 0 3px rgba(79,142,247,0.2);
}
optgroup{font-weight:700;color:var(--sub)}
option{font-weight:600;background:#0d1428}

/* TEXTAREA */
textarea{
  width:100%;
  padding:1rem 1.2rem;
  border-radius:16px;
  border:1px solid var(--glass-border);
  background:rgba(15,22,45,0.6);
  color:var(--text);
  font-size:.87rem;line-height:1.75;
  resize:vertical;outline:none;
  backdrop-filter:blur(10px);
  transition:border-color .15s,box-shadow .15s;
  margin-bottom:.5rem;
  font-family:'Courier New',monospace;
}
textarea:focus{
  border-color:var(--pri);
  box-shadow:0 0 0 3px rgba(79,142,247,0.18);
}
textarea::placeholder{color:var(--ph)}

.stats{
  display:flex;justify-content:space-between;
  font-size:.8rem;color:var(--sub);font-weight:600;padding:0 .2rem;
}
.stats b{color:var(--pri2)}

/* PROGRESS */
.prog-wrap{margin:.8rem 0 .4rem;display:none}
.prog-bar{
  background:rgba(255,255,255,0.08);
  border-radius:30px;height:6px;overflow:hidden;
}
.prog-fill{
  height:6px;
  background:linear-gradient(90deg,var(--pri),var(--acc));
  width:0%;border-radius:30px;
  transition:width .1s;
  box-shadow:0 0 10px rgba(79,142,247,0.6);
}
.prog-lbl{font-size:.8rem;color:var(--sub);font-weight:600;margin-top:6px;text-align:center}

/* CHIPS */
.chips-wrap{display:none}
.chips-ttl{font-size:.72rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:.35rem .85rem .35rem .75rem;
  border-radius:30px;font-size:.82rem;font-weight:600;
  border:1px solid var(--glass-border);
  background:var(--glass);
  color:var(--sub);
  cursor:pointer;
  backdrop-filter:blur(8px);
  transition:all .15s;user-select:none;
}
.chip.on{
  background:linear-gradient(135deg,var(--pri),#3b75e8);
  border-color:transparent;color:#fff;
  box-shadow:0 3px 14px rgba(79,142,247,0.4);
}
.chip:hover:not(.on){
  background:var(--glass2);
  border-color:rgba(255,255,255,0.22);
  color:var(--text);
}
.chip .cnt{
  background:rgba(0,0,0,0.2);
  padding:.04rem .38rem;border-radius:20px;font-size:.74rem;
}
.chip.on .cnt{background:rgba(255,255,255,0.22)}
.chip .x{margin-left:2px;opacity:.5;font-size:.74rem;transition:opacity .1s}
.chip .x:hover{opacity:1;color:#f87171}

/* VIEWER */
.viewer{text-align:center}
.vtabs{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-bottom:1.1rem}
.vtab{
  padding:.33rem .85rem;border-radius:30px;
  border:1px solid var(--glass-border);
  background:var(--glass);
  color:var(--sub);font-size:.79rem;font-weight:600;
  cursor:pointer;backdrop-filter:blur(8px);
  transition:all .15s;user-select:none;
}
.vtab.on{
  background:linear-gradient(135deg,var(--pri),#3b75e8);
  border-color:transparent;color:#fff;
  box-shadow:0 3px 14px rgba(79,142,247,0.4);
}
.vtab:hover:not(.on){background:var(--glass2);color:var(--text)}
.vpname{
  font-size:1rem;font-weight:800;
  background:linear-gradient(135deg,var(--pri2),var(--acc));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:1rem;
  display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;
}
.vpname i{-webkit-text-fill-color:initial;color:var(--pri2)}

.qbox{
  background:rgba(255,255,255,0.06);
  padding:1.1rem;border-radius:24px;
  display:inline-block;
  border:1px solid var(--glass-border);
  box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 30px rgba(79,142,247,0.12);
  margin-bottom:.9rem;
  backdrop-filter:blur(12px);
}
.qbox img{
  width:min(270px,68vw);height:auto;aspect-ratio:1/1;
  display:block;border-radius:14px;
  filter:drop-shadow(0 4px 12px rgba(0,0,0,0.3));
}
.qtxt{
  font-size:.8rem;font-weight:700;word-break:break-all;
  background:rgba(79,142,247,0.1);
  padding:.5rem 1rem;border-radius:30px;
  border:1px solid rgba(79,142,247,0.25);
  color:var(--pri2);
  display:inline-block;max-width:96%;
  margin:.1rem auto .5rem;
  font-family:'Courier New',monospace;
}
.qidx{font-size:.85rem;font-weight:700;color:var(--sub);margin-bottom:.7rem}
.dl1{
  padding:.45rem 1.1rem;border-radius:30px;
  border:1px solid rgba(52,211,153,0.4);
  background:rgba(52,211,153,0.1);
  color:var(--green);font-size:.82rem;font-weight:700;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  transition:all .15s;backdrop-filter:blur(8px);
}
.dl1:hover{
  background:linear-gradient(135deg,var(--green),var(--green2));
  border-color:transparent;color:#fff;
  box-shadow:0 4px 16px rgba(52,211,153,0.4);
}
.navrow{display:flex;justify-content:center;gap:12px;margin-top:1rem}
.nb{
  width:58px;height:58px;border-radius:16px;
  border:1px solid var(--glass-border);
  background:var(--glass);
  cursor:pointer;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);
  box-shadow:0 4px 14px rgba(0,0,0,0.3);
  transition:all .15s;user-select:none;
}
.nb:hover{
  background:linear-gradient(135deg,var(--pri),#3b75e8);
  border-color:transparent;color:#fff;
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(79,142,247,0.45);
}

/* Placeholder */
.ph-box{
  padding:3.5rem 1.5rem;
  border:1px dashed var(--glass-border);
  border-radius:16px;color:var(--ph);text-align:center;
}
.ph-box i{font-size:2rem;opacity:.3;display:block;margin-bottom:.9rem}
.ph-box p{font-size:.92rem;font-weight:600}

/* Animations */
.sR{animation:sR .2s ease}
.sL{animation:sL .2s ease}
@keyframes sR{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
@keyframes sL{from{opacity:0;transform:translateX(-18px)}to{opacity:1;transform:translateX(0)}}

footer{
  margin-top:.4rem;
  text-align:center;font-size:.76rem;
  padding-bottom:.8rem;
  color:rgba(130,150,200,0.4);
}

/* Light mode (optional toggle) */
body.light{
  --bg1:#eef2ff;
  --bg2:#e8eef8;
  --glass:rgba(255,255,255,0.65);
  --glass2:rgba(255,255,255,0.85);
  --glass-border:rgba(100,130,200,0.2);
  --text:#1a2540;
  --sub:#5a6e90;
  --ph:#9aaac0;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% -10%, rgba(79,142,247,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 110%, rgba(167,139,250,0.1) 0%, transparent 55%);
  background-color:var(--bg1);
}
body.light select{background:rgba(230,238,255,0.8);color:var(--text)}
body.light option{background:#eef2ff}
body.light textarea{background:rgba(230,238,255,0.7);color:var(--text)}

@media(max-width:560px){
  .row{justify-content:center}
  h1{font-size:1.4rem}
  .nb{width:52px;height:52px;font-size:1.1rem}
}
</style>
</head>
<body>
<div class="app">

<!-- INPUT CARD -->
<div class="card">
  <div class="head">
    <h1><i class="fas fa-qrcode"></i> <span class="titleAnim">ZOLOTO_N1</span> <span class="badge" id="bdg">0 valid</span></h1>
    <button class="btn" id="darkBtn"><i class="fas fa-sun"></i> Light</button>
  </div>

  <!-- Product select -->
  <div class="lbl"><i class="fas fa-box"></i>&nbsp; Mahsulotni tanlang</div>
  <div class="sel-wrap">
    <i class="fas fa-box-open ico"></i>
    <select id="psel">
      <option value="">— Mahsulot tanlang —</option>
      <optgroup label="0,45L — CAN (Konserva)">
        <option>Sarbast Lite CAN 0,45L</option>
        <option>Sarbast Original CAN 0,45L</option>
        <option>Sarbast Original Unfiltered CAN 0,45L</option>
        <option>Sarbast Special CAN 0,45L</option>
        <option>Tuborg Green CAN 0,45L</option>
        <option>Tuborg Lite CAN 0,45L</option>
        <option>Zatecky Gus Svetliy CAN 0,45L</option>
        <option>Zatecky Gus Exportniy CAN 0,45L</option>
        <option>Zatecky Gus Krepkiy CAN 0,45L</option>
        <option>Zatecky Gus Nefiltrovaniy CAN 0,45L</option>
        <option>Carlsberg Pilsner CAN 0,45L</option>
        <option>Kronenbourg Blanc CAN 0,45L</option>
      </optgroup>
      <optgroup label="0,5L — RGB (Shisha butilka)">
        <option>Sarbast Lite RGB 0,5L</option>
        <option>Sarbast Original RGB 0,5L</option>
        <option>Sarbast Special RGB 0,5L</option>
        <option>Tuborg Green RGB 0,5L</option>
        <option>Tuborg Lite RGB 0,5L</option>
        <option>Zatecky Gus Svetliy RGB 0,47L</option>
        <option>Zatecky Gus Exportniy RGB 0,47L</option>
        <option>Carlsberg Pilsner RGB 0,45L</option>
        <option>Kronenbourg Blanc RGB 0,43L</option>
      </optgroup>
      <optgroup label="1,5L — PET (Baklashka)">
        <option>Sarbast Lite PET 1,5L</option>
        <option>Sarbast Original PET 1,5L</option>
        <option>Sarbast Special PET 1,5L</option>
      </optgroup>
    </select>
    <i class="fas fa-chevron-down arr"></i>
  </div>

  <!-- Buttons -->
  <div class="row">
    <button class="btn" id="uploadBtn"><i class="fas fa-upload"></i> TXT</button>
    <button class="btn pri" id="genBtn"><i class="fas fa-play"></i> Generate</button>
    <button class="btn" id="clearBtn"><i class="fas fa-eraser"></i> Tozalash</button>
    <button class="btn grn" id="zipBtn" disabled><i class="fas fa-file-archive"></i> ZIP Yuklab olish</button>
  </div>

  <!-- Textarea -->
  <div class="lbl"><i class="fas fa-list"></i>&nbsp; QR kodlarni kiriting (har qatorda 1 ta)</div>
  <textarea id="ta" rows="6" placeholder="010460990022007021SL8VPBR91EE06922Kg3LbVsB1j...
har qatorda bitta kod yozing yoki TXT fayl yuklang"></textarea>

  <!-- Progress -->
  <div class="prog-wrap" id="pw">
    <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
    <div class="prog-lbl" id="pl">...</div>
  </div>

  <div class="stats">
    <span>Qatorlar: <b id="tl">0</b></span>
    <span>Yaroqli (&ge;5): <b id="el">0</b></span>
  </div>
</div>

<!-- CHIPS CARD -->
<div class="card chips-wrap" id="chipsCard">
  <div class="chips-ttl"><i class="fas fa-layer-group"></i>&nbsp; Tayyor mahsulotlar</div>
  <div class="chips" id="chips"></div>
</div>

<!-- VIEWER CARD -->
<div class="card viewer" id="vcard" style="display:none"></div>

<footer><i class="fas fa-shield-alt"></i> ZOLOTO_N1 &middot; DataMatrix Generator</footer>
</div>

<input type="file" id="fi" accept=".txt,text/plain" style="display:none">

<script>
(function(){
"use strict";

const ta=document.getElementById('ta');
const psel=document.getElementById('psel');
const bdg=document.getElementById('bdg');
const tlEl=document.getElementById('tl');
const elEl=document.getElementById('el');
const genBtn=document.getElementById('genBtn');
const clearBtn=document.getElementById('clearBtn');
const darkBtn=document.getElementById('darkBtn');
const uploadBtn=document.getElementById('uploadBtn');
const fi=document.getElementById('fi');
const zipBtn=document.getElementById('zipBtn');
const pw=document.getElementById('pw');
const pf=document.getElementById('pf');
const pl=document.getElementById('pl');
const chipsCard=document.getElementById('chipsCard');
const chipsEl=document.getElementById('chips');
const vcard=document.getElementById('vcard');

let gen={}; // name -> [{text,dataUrl}]
let vidx={}; // name -> har bir mahsulot uchun saqlangan joriy pozitsiya (index)
let active=null;
let busy=false;

function tok(line){const t=line.trim();return t?t.split(/\s+/)[0]:'';}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));}
function sfn(s){return s.replace(/[^\w\u0400-\u04ff\-\.]/g,'_').replace(/_+/g,'_');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

function counts(){
  const lines=ta.value.split(/\r?\n/);
  tlEl.textContent=lines.length;
  elEl.textContent=lines.map(tok).filter(t=>t.length>=5).length;
}
function badge(){
  let n=0;Object.values(gen).forEach(a=>n+=a.length);
  bdg.textContent=n+' valid';
  zipBtn.disabled=n===0;
}

ta.addEventListener('input',counts);
counts();

darkBtn.addEventListener('click',()=>{
  document.body.classList.toggle('light');
  darkBtn.innerHTML=document.body.classList.contains('light')
    ?'<i class="fas fa-moon"></i> Dark':'<i class="fas fa-sun"></i> Light';
});

clearBtn.addEventListener('click',()=>{ta.value='';counts();});

uploadBtn.addEventListener('click',()=>fi.click());
fi.addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{ta.value=ev.target.result;counts();fi.value='';};
  r.readAsText(f);
});

function makeDM(text){
  return new Promise((res,rej)=>{
    try{
      const c=document.createElement('canvas');
      bwipjs.toCanvas(c,{bcid:'datamatrix',text,scale:5,includetext:false,padding:6,backgroundcolor:'FFFFFF'});
      res(c.toDataURL('image/png'));
    }catch(e){rej(e);}
  });
}

genBtn.addEventListener('click',async()=>{
  if(busy)return;
  const pname=psel.value.trim();
  if(!pname){alert('Mahsulotni tanlang!');psel.focus();return;}
  const lines=ta.value.split(/\r?\n/);
  const valid=lines.map(tok).filter(t=>t.length>=5);
  if(!valid.length){alert('QR kodlarni kiriting (kamida 5 belgi).');return;}

  busy=true;genBtn.disabled=true;
  pw.style.display='block';pf.style.width='0%';

  const codes=[];
  const BATCH=15;
  for(let i=0;i<valid.length;i+=BATCH){
    const batch=valid.slice(i,i+BATCH);
    const res=await Promise.all(batch.map(t=>makeDM(t).then(u=>({text:t,dataUrl:u})).catch(()=>null)));
    res.filter(Boolean).forEach(x=>codes.push(x));
    const pct=Math.round(((i+BATCH)/valid.length)*100);
    pf.style.width=Math.min(pct,100)+'%';
    pl.textContent=pname+' · '+Math.min(i+BATCH,valid.length)+' / '+valid.length;
    await sleep(12);
  }

  pw.style.display='none';
  genBtn.disabled=false;busy=false;
  if(!codes.length){alert("Kodlar yaratilmadi.");return;}

  const isNew=!gen[pname];
  if(gen[pname]) gen[pname].push(...codes);
  else gen[pname]=codes;

  active=pname;
  // Yangi mahsulot bo'lsa 0-dan boshlanadi, mavjud bo'lsa saqlangan pozitsiyada qoladi
  if(isNew || vidx[pname]===undefined) vidx[pname]=gen[pname].length-codes.length;

  badge();renderChips();renderViewer();
  ta.value='';counts();psel.value='';
});

function renderChips(){
  const keys=Object.keys(gen);
  chipsCard.style.display=keys.length?'block':'none';
  chipsEl.innerHTML=keys.map(n=>`
    <div class="chip${n===active?' on':''}" onclick="SW('${esc(n)}')">
      <i class="fas fa-box-open" style="font-size:.75rem"></i>
      ${esc(n)}<span class="cnt">${gen[n].length}</span>
      <span class="x" onclick="event.stopPropagation();DEL('${esc(n)}')"><i class="fas fa-times"></i></span>
    </div>`).join('');
}

window.SW=function(n){
  active=n;
  // vi qiymatini global o'rniga shu mahsulot uchun saqlangan pozitsiyadan olamiz
  if(vidx[n]===undefined) vidx[n]=0;
  renderChips();renderViewer('sR');
};
window.DEL=function(n){
  if(!confirm('"'+n+'" o\'chirish?'))return;
  delete gen[n];
  delete vidx[n];
  if(active===n){const k=Object.keys(gen);active=k.length?k[0]:null;}
  badge();renderChips();renderViewer();
};

function renderViewer(anim=''){
  vcard.style.display='block';
  if(!active||!gen[active]){
    vcard.innerHTML=`<div class="ph-box"><i class="fas fa-smile-wink"></i><p>Mahsulot tanlang, QR kodlar yozing va Generate bosing.</p></div>`;
    return;
  }
  const codes=gen[active];
  if(vidx[active]===undefined) vidx[active]=0;
  if(vidx[active]>codes.length-1) vidx[active]=codes.length-1;
  if(vidx[active]<0) vidx[active]=0;
  const vi=vidx[active];
  const item=codes[vi];
  const keys=Object.keys(gen);

  const tabs=keys.length>1?`<div class="vtabs">${keys.map(n=>`
    <div class="vtab${n===active?' on':''}" onclick="SW('${esc(n)}')">${esc(n)} <span style="opacity:.6">(${gen[n].length})</span></div>`).join('')}</div>`:'' ;

  vcard.innerHTML=`
    <div class="vpname"><i class="fas fa-box-open"></i>${esc(active)}</div>
    ${tabs}
    <div id="vc" class="${anim}">
      <div class="qbox"><img src="${item.dataUrl}" alt="DM" loading="lazy"></div><br>
      <div class="qtxt">${esc(item.text)}</div>
      <div class="qidx">${vi+1} / ${codes.length}</div>
      <button class="dl1" id="dl1"><i class="fas fa-download"></i> Yuklab olish</button>
    </div>
    <div class="navrow">
      <div class="nb" id="nb_p"><i class="fas fa-chevron-up"></i></div>
      <div class="nb" id="nb_n"><i class="fas fa-chevron-down"></i></div>
    </div>`;

  document.getElementById('nb_p').onclick=()=>{
    if(vidx[active]>0){vidx[active]--;renderViewer('sL');}
  };
  document.getElementById('nb_n').onclick=()=>{
    if(vidx[active]<codes.length-1){vidx[active]++;renderViewer('sR');}
  };
  document.getElementById('dl1').onclick=()=>dlOne(active,vi);
}

async function dlOne(pname,idx){
  const item=gen[pname][idx];if(!item)return;
  const blob=await(await fetch(item.dataUrl)).blob();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=sfn(pname)+'_'+String(idx+1).padStart(3,'0')+'.png';
  a.click();URL.revokeObjectURL(a.href);
}

zipBtn.addEventListener('click',async()=>{
  const keys=Object.keys(gen);
  if(!keys.length){alert('Avval Generate bosing!');return;}
  zipBtn.disabled=true;
  pw.style.display='block';pf.style.width='0%';
  const zip=new JSZip();
  let total=0;keys.forEach(k=>total+=gen[k].length);
  let done=0;
  for(const k of keys){
    const codes=gen[k];
    const fn=sfn(k);
    for(let i=0;i<codes.length;i++){
      const blob=await(await fetch(codes[i].dataUrl)).blob();
      const path=codes.length===1?fn+'.png':fn+'/'+fn+'_'+String(i+1).padStart(3,'0')+'.png';
      zip.file(path,blob);
      done++;
      pf.style.width=Math.round(done/total*100)+'%';
      pl.textContent='ZIP: '+k+' · '+(i+1)+'/'+codes.length;
      await sleep(6);
    }
  }
  pl.textContent='ZIP tayyorlanmoqda...';
  const blob=await zip.generateAsync({type:'blob'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='miyras_datamatrix.zip';
  a.click();URL.revokeObjectURL(a.href);
  pw.style.display='none';zipBtn.disabled=false;
});

renderViewer();
})();
</script>
</body>
</html>
